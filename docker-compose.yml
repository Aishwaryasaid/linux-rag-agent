
services:
  rag-agent:
    build: .
    container_name: rag-agent
    volumes:
      - ./books:/app/books
      - ./chroma_db:/app/chroma_db
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    stdin_open: true
    tty: true
    networks:
      - rag_network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - rag_network

volumes:
  ollama_data:

networks:
  rag_network:
    driver: bridge