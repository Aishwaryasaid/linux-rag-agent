name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check for syntax errors
        run: python -m py_compile  *.py
      
      - name: Check imports work
        run: python -c "from pdf_loader import pdf_to_text; from chunker import text_to_chunks; from embedder import embed_chunks; from vector_store import store_chunks_in_chroma; from retriever import retrieve_chunks; from llm_client import llm_answer; from rag_agent import RAGAgent; print('✅ All imports successful')"

  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install security tools
        run: pip install bandit safety
      
      - name: Check for hardcoded secrets
        run: bandit -r . -ll || true
      
      - name: Check for vulnerable dependencies
        run: safety check || true

  build:
    needs: [test, security]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: rag-agent:latest